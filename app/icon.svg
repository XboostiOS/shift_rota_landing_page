<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="15" fill="#0E0E11"/>
  <!-- Shift dial: amber day arc (top) → teal night arc (bottom), the app's shift spectrum -->
  <circle cx="32" cy="34" r="17" stroke="#33333A" stroke-width="4"/>
  <path d="M15 34 A17 17 0 0 1 49 34" stroke="#FFC24D" stroke-width="4" stroke-linecap="round"/>
  <path d="M49 34 A17 17 0 0 1 15 34" stroke="#5FD0BC" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <!-- wake hand pointing to ~05:10 -->
  <line x1="32" y1="34" x2="24" y2="26" stroke="#E9DCC2" stroke-width="4" stroke-linecap="round"/>
  <circle cx="32" cy="34" r="3.4" fill="#E9DCC2"/>
  <!-- alarm bell top -->
  <rect x="28.5" y="9" width="7" height="6" rx="2" fill="#E9DCC2"/>
</svg>
